<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AI Code Review Agent</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        /* ── Theme Variables ── */
        :root, [data-theme="dark"] {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --bg-elevated: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-subtle: rgba(99, 102, 241, 0.12);
            --accent-glow: rgba(99, 102, 241, 0.2);
            --error: #f85149;
            --glass-bg: rgba(22, 27, 34, 0.8);
            --glass-border: rgba(48, 54, 61, 0.5);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
            --orb-1: rgba(99, 102, 241, 0.07);
            --orb-2: rgba(139, 92, 246, 0.06);
            --input-bg: #0d1117;
            color-scheme: dark;
        }

        [data-theme="light"] {
            --bg-primary: #f6f8fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f3f6;
            --bg-elevated: #e8ecf0;
            --border: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --text-muted: #8b949e;
            --accent: #4f46e5;
            --accent-hover: #6366f1;
            --accent-subtle: rgba(79, 70, 229, 0.08);
            --accent-glow: rgba(79, 70, 229, 0.12);
            --error: #cf222e;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(208, 215, 222, 0.5);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
            --orb-1: rgba(79, 70, 229, 0.05);
            --orb-2: rgba(139, 92, 246, 0.04);
            --input-bg: #f6f8fa;
            color-scheme: light;
        }

        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
            transition: background 0.35s ease, color 0.35s ease;
        }

        /* ── Ambient Orbs ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            transition: background 0.6s ease;
        }
        .orb-1 {
            width: 500px; height: 500px;
            top: -180px; left: -120px;
            background: var(--orb-1);
            animation: float-1 10s ease-in-out infinite;
        }
        .orb-2 {
            width: 600px; height: 600px;
            bottom: -220px; right: -150px;
            background: var(--orb-2);
            animation: float-2 13s ease-in-out 2s infinite;
        }
        @keyframes float-1 {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.04); }
        }
        @keyframes float-2 {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(16px) scale(1.06); }
        }

        /* ── Login Card ── */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            margin: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: var(--shadow-lg);
            transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        /* ── Logo ── */
        .logo-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: transform 0.3s ease;
        }
        .logo-icon:hover { transform: scale(1.05) translateY(-2px); }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .title { font-size: 22px; font-weight: 800; text-align: center; letter-spacing: -0.4px; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 28px; }

        /* ── Theme Toggle ── */
        .theme-toggle {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 22px;
            border-radius: 11px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        .theme-toggle:hover { border-color: var(--accent); }
        .toggle-thumb {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--accent);
            position: absolute;
            top: 2px; left: 2px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
        }
        [data-theme="light"] .toggle-thumb { transform: translateX(18px); }
        .toggle-icon {
            position: absolute;
            font-size: 9px;
            top: 50%;
            transform: translateY(-50%);
            transition: opacity 0.3s ease;
            line-height: 1;
        }
        .icon-moon { right: 5px; opacity: 0.4; }
        .icon-sun  { left: 5px; opacity: 0.4; }
        [data-theme="dark"]  .icon-moon { opacity: 1; }
        [data-theme="light"] .icon-sun  { opacity: 1; }

        /* ── Form ── */
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .input-wrapper {
            position: relative;
        }
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 2px;
            transition: color 0.2s;
        }
        .toggle-pwd:hover { color: var(--text-secondary); }

        /* ── Error ── */
        .error-msg {
            color: var(--error);
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }
        .error-msg.visible { display: block; }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-submit:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-submit .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ── Demo Credentials ── */
        .demo-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            transition: background 0.35s ease, border-color 0.35s ease;
        }
        .demo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .demo-row + .demo-row { margin-top: 6px; }
        .demo-label { font-size: 12.5px; color: var(--text-muted); }
        .demo-value {
            font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--input-bg);
            padding: 3px 10px;
            border-radius: 6px;
            user-select: all;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>

<body>
    <!-- Ambient Orbs -->
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <!-- Login Card -->
    <div class="login-card">
        <!-- Theme Toggle -->
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
            <span class="toggle-icon icon-sun">☀️</span>
            <span class="toggle-icon icon-moon">🌙</span>
            <div class="toggle-thumb"></div>
        </button>

        <!-- Logo -->
        <div class="logo-icon">
            <img src="https://d2u1z1lopyfwlx.cloudfront.net/thumbnails/1c91452a-571e-51d5-bbfa-18a28e213d0c/aea87596-f96d-554b-b6b6-3f49ba6ea7ca.jpg" alt="Logo" />
        </div>
        <h1 class="title">AI Code Review Agent</h1>
        <p class="subtitle">Sign in to your account</p>

        <!-- Form -->
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="admin@example.com" required />
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required style="padding-right:40px;" />
                    <button type="button" id="togglePwd" class="toggle-pwd" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>

            <p id="errorMsg" class="error-msg"></p>

            <button type="submit" id="loginBtn" class="btn-submit">Sign In</button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">Demo Credentials</span>
            <span class="divider-line"></span>
        </div>

        <!-- Demo Creds -->
        <div class="demo-card">
            <div class="demo-row">
                <span class="demo-label">Email</span>
                <code class="demo-value">admin@example.com</code>
            </div>
            <div class="demo-row">
                <span class="demo-label">Password</span>
                <code class="demo-value">admin123</code>
            </div>
        </div>

        <p class="footer-text">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Secured with session authentication
        </p>
    </div>

    <!-- Script -->
    <script>
        const VALID_EMAIL = "admin@example.com";
        const VALID_PASSWORD = "admin123";

        const html = document.documentElement;
        const form = document.getElementById("loginForm");
        const emailEl = document.getElementById("email");
        const passEl = document.getElementById("password");
        const errorMsg = document.getElementById("errorMsg");
        const loginBtn = document.getElementById("loginBtn");
        const togglePwd = document.getElementById("togglePwd");
        const themeToggle = document.getElementById("themeToggle");

        // ── Theme ──
        const savedTheme = localStorage.getItem("app-theme") || "dark";
        html.setAttribute("data-theme", savedTheme);

        themeToggle.addEventListener("click", () => {
            const current = html.getAttribute("data-theme");
            const next = current === "dark" ? "light" : "dark";
            html.setAttribute("data-theme", next);
            localStorage.setItem("app-theme", next);
        });

        // ── Toggle Password ──
        togglePwd.addEventListener("click", () => {
            const show = passEl.type === "password";
            passEl.type = show ? "text" : "password";
            togglePwd.textContent = show ? "🙈" : "👁";
        });

        // ── Login ──
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            errorMsg.classList.remove("visible");

            const email = emailEl.value.trim();
            const password = passEl.value;

            if (!email || !password) { showError("Please fill in all fields."); return; }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Signing in…';

            setTimeout(() => {
                if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                    sessionStorage.setItem("authenticated", "true");
                    sessionStorage.setItem("user", email);
                    sessionStorage.setItem("firstLogin", "true");
                    window.location.href = "/app";
                } else {
                    showError("Invalid email or password.");
                    loginBtn.disabled = false;
                    loginBtn.textContent = "Sign In";
                }
            }, 700);
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add("visible");
        }

        // ── Auto-redirect ──
        if (sessionStorage.getItem("authenticated") === "true") {
            window.location.href = "/app";
        }
    </script>
</body>
</html>
